<!DOCTYPE html>
<html lang="uk">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Бордо 🐾</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

</head>

<body>

    <!-- Лапки та сердечка -->
    <div id="effects"></div>

    <!-- Основна картка -->
    <div class="card">

        <h1>Привіт! 👋</h1>

        <h2>Я Бордо 🐾</h2>

        <p class="description">
            Службовий собака<br>
            кінологічного центру<br>
            ГУНП в Сумській області
        </p>

        <!-- Бордо -->
        <div class="dog-box">

            <img
                src="images/bordo.png"
                id="bordo"
                alt="Бордо"
                onclick="showWish()">

        </div>

        <p class="tap">
            🐾 Торкнись мене
        </p>

        <!-- Хмаринка -->
        <div id="speech">

            <div id="wish">

                Привіт! ❤️

            </div>

        </div>

        <footer>

            З любов'ю,<br>
            твій друг Бордо 🐾

        </footer>

    </div>

    <script src="script.js"></script>

</body>

</html>
